<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Highly protective global error handler to suppress cross-origin third-party script errors (e.g. ad networks)
      window.addEventListener('error', function (event) {
        var isAdError = 
          !event.filename || 
          event.filename.indexOf('effectivecpmnetwork') > -1 || 
          event.filename.indexOf('invoke.js') > -1 || 
          event.message === 'Script error.' || 
          (event.message && event.message.indexOf('effectivecpmnetwork') > -1);
        
        if (isAdError) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        var reasonStr = String(event.reason || '');
        if (reasonStr.indexOf('effectivecpmnetwork') > -1 || reasonStr.indexOf('invoke.js') > -1) {
          event.preventDefault();
          event.stopPropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
